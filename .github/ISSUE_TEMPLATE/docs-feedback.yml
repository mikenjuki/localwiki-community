name: Documentation Feedback
description: Report an error, suggest an improvement, or request new documentation
title: "[Docs]: "
labels: ["docs-feedback"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the localWiki documentation.

        **Before you submit**, please check:
        - [ ] I've [searched existing docs feedback](https://github.com/mikenjuki/localwiki-community/issues?q=is%3Aissue+label%3Adocs-feedback) to avoid duplicates
  - type: input
    id: page
    attributes:
      label: Documentation page
      description: Which page is this about? Paste the URL or page title.
      placeholder: e.g. https://localwiki.nextbyts.com/docs/getting-started/installation
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type of feedback
      options:
        - Incorrect information
        - Confusing or unclear
        - Missing information
        - Typo or formatting
        - New topic request
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Details
      description: What's wrong or what should be added?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: If you have a specific wording or content suggestion, include it here.
