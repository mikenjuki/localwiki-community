name: Bug Report
description: Report a bug or unexpected behavior in localWiki
title: "[Bug]: "
labels: ["bug-report", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below so we can investigate.
  - type: input
    id: version
    attributes:
      label: localWiki version
      description: Which version are you running? (Check Settings > About)
      placeholder: e.g. 1.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora)
        - Linux (Arch)
        - Linux (Other)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reliably trigger this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error reference or logs
      description: If you saw an LW-xxxxxx error code, paste it here. Any console output is also helpful.
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this isn't a duplicate.
          required: true
